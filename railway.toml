[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node --max-http-header-size=65536 --import tsx/esm src/web/server.ts"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[volumes]]
mountPath = "/app/data"

[[volumes]]
mountPath = "/app/cookies"
