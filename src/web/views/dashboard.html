<div x-data="liveDashboard()" x-init="init()">
  <!-- Summary Stats Row -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
    <div class="bg-dark-card border border-dark-border rounded-lg p-4">
      <div class="text-[11px] text-kaia-muted uppercase tracking-wider mb-1">전체 인플루언서</div>
      <div class="text-2xl font-heading font-bold text-white font-mono" x-text="formatNumber(stats.totalInfluencers)"></div>
      <div class="text-[11px] text-kaia-muted mt-1">AI 분류: <span class="text-accent" x-text="formatNumber(stats.aiClassified)"></span></div>
    </div>
    <div class="bg-dark-card border border-dark-border rounded-lg p-4">
      <div class="text-[11px] text-kaia-muted uppercase tracking-wider mb-1">활성 캠페인</div>
      <div class="text-2xl font-heading font-bold text-accent font-mono" x-text="stats.activeCampaigns"></div>
      <div class="text-[11px] text-kaia-muted mt-1">전체: <span class="text-white" x-text="stats.totalCampaigns"></span></div>
    </div>
    <div class="bg-dark-card border border-dark-border rounded-lg p-4">
      <div class="text-[11px] text-kaia-muted uppercase tracking-wider mb-1">DM 발송</div>
      <div class="text-2xl font-heading font-bold text-success font-mono" x-text="formatNumber(stats.totalSent)"></div>
      <div class="text-[11px] text-kaia-muted mt-1">실패: <span class="text-error" x-text="stats.totalFailed"></span> | 대기: <span class="text-warning" x-text="stats.totalPending"></span></div>
    </div>
    <div class="bg-dark-card border border-dark-border rounded-lg p-4">
      <div class="text-[11px] text-kaia-muted uppercase tracking-wider mb-1">스크래핑 키워드</div>
      <div class="text-2xl font-heading font-bold text-info font-mono" x-text="stats.activeKeywords"></div>
      <div class="text-[11px] text-kaia-muted mt-1">누적 수집: <span class="text-white" x-text="formatNumber(stats.totalExtracted)"></span></div>
    </div>
  </div>

  <!-- Cookie Health Banner -->
  <div x-show="expiredCookies.length > 0" class="bg-error/10 border border-error/30 rounded-lg p-3 mb-4">
    <div class="flex items-center gap-2">
      <span class="text-error text-sm font-semibold">쿠키 만료 경고</span>
      <template x-for="a in expiredCookies" :key="a.platform + ':' + a.username">
        <span class="badge badge-error text-[10px]" x-text="a.platform + ':@' + a.username"></span>
      </template>
    </div>
  </div>

  <!-- Two Column Layout -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
    <!-- Left: Active Scraping -->
    <div class="bg-dark-card border border-dark-border rounded-lg overflow-hidden">
      <div class="px-4 py-3 border-b border-dark-border flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="live-dot"></span>
          <h3 class="text-sm font-semibold text-white">스크래핑 현황</h3>
        </div>
        <span class="text-[11px] text-kaia-muted" x-text="keywords.length + '개 키워드'"></span>
      </div>
      <div class="max-h-[400px] overflow-y-auto">
        <table class="min-w-full data-table">
          <thead>
            <tr class="border-b border-dark-border">
              <th class="px-3 py-2 text-left">키워드</th>
              <th class="px-3 py-2 text-center">플랫폼</th>
              <th class="px-3 py-2 text-right">수집</th>
              <th class="px-3 py-2 text-center">상태</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="k in keywords" :key="k.pairId">
              <tr class="border-b border-dark-border/30">
                <td class="px-3 py-2 text-white text-[12px]" x-text="k.keyword"></td>
                <td class="px-3 py-2 text-center">
                  <span class="badge text-[10px]" :class="'badge-' + (k.platform === 'instagram' ? 'ig' : k.platform === 'twitter' ? 'tw' : k.platform === 'tiktok' ? 'tt' : k.platform === 'youtube' ? 'yt' : 'xhs')" x-text="k.platform"></span>
                </td>
                <td class="px-3 py-2 text-right num text-white text-[12px]" x-text="formatNumber(k.totalExtracted)"></td>
                <td class="px-3 py-2 text-center">
                  <template x-if="k._running">
                    <span class="flex items-center justify-center gap-1">
                      <span class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse"></span>
                      <span class="text-accent text-[10px]" x-text="k._phase"></span>
                    </span>
                  </template>
                  <template x-if="!k._running">
                    <span class="text-[10px] text-kaia-muted" x-text="k.lastScrapedAt ? formatDate(k.lastScrapedAt).split(' ')[0] : '-'"></span>
                  </template>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
        <div x-show="keywords.length === 0" class="text-center text-kaia-muted py-8 text-sm">키워드가 없습니다. 데이터 관리에서 등록하세요.</div>
      </div>
    </div>

    <!-- Right: Campaigns Status -->
    <div class="bg-dark-card border border-dark-border rounded-lg overflow-hidden">
      <div class="px-4 py-3 border-b border-dark-border flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="live-dot"></span>
          <h3 class="text-sm font-semibold text-white">캠페인 현황</h3>
        </div>
        <span class="text-[11px] text-kaia-muted" x-text="campaigns.length + '개 캠페인'"></span>
      </div>
      <div class="max-h-[400px] overflow-y-auto">
        <table class="min-w-full data-table">
          <thead>
            <tr class="border-b border-dark-border">
              <th class="px-3 py-2 text-left">캠페인</th>
              <th class="px-3 py-2 text-center">플랫폼</th>
              <th class="px-3 py-2 text-right">발송</th>
              <th class="px-3 py-2 text-right">실패</th>
              <th class="px-3 py-2 text-right">대기</th>
              <th class="px-3 py-2 text-center">상태</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="c in campaigns" :key="c.id">
              <tr class="border-b border-dark-border/30">
                <td class="px-3 py-2 text-white text-[12px] max-w-[160px] truncate" x-text="c.name"></td>
                <td class="px-3 py-2 text-center">
                  <span class="badge text-[10px]" :class="'badge-' + (c.platform === 'instagram' ? 'ig' : c.platform === 'twitter' ? 'tw' : c.platform === 'tiktok' ? 'tt' : c.platform === 'youtube' ? 'yt' : 'xhs')" x-text="c.platform"></span>
                </td>
                <td class="px-3 py-2 text-right num text-success text-[12px]" x-text="c.total_sent || 0"></td>
                <td class="px-3 py-2 text-right num text-error text-[12px]" x-text="c.total_failed || 0"></td>
                <td class="px-3 py-2 text-right num text-warning text-[12px]" x-text="Math.max(0, (c.total_queued || 0) - (c.total_sent || 0) - (c.total_failed || 0))"></td>
                <td class="px-3 py-2 text-center">
                  <span class="badge text-[10px]"
                        :class="c.status === 'active' || c.status === 'processing' ? 'badge-success' : c.status === 'completed' ? 'badge-info' : c.status === 'paused' ? 'badge-warning' : 'badge-c'"
                        x-text="c.status"></span>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
        <div x-show="campaigns.length === 0" class="text-center text-kaia-muted py-8 text-sm">캠페인이 없습니다. 데이터 관리에서 생성하세요.</div>
      </div>
    </div>
  </div>

  <!-- Platform Cookie Status (compact) -->
  <div class="grid grid-cols-3 md:grid-cols-6 gap-2 mb-6">
    <template x-for="p in platforms" :key="p.platform">
      <div class="bg-dark-card border border-dark-border rounded-lg p-3 text-center" :class="p.hasCookies ? 'border-success/20' : 'border-error/20'">
        <div class="text-[11px] text-kaia-muted capitalize" x-text="p.platform"></div>
        <div class="flex items-center justify-center gap-1 mt-1">
          <span class="w-1.5 h-1.5 rounded-full" :class="p.hasCookies ? 'bg-success' : 'bg-error'"></span>
          <span class="text-[10px]" :class="p.hasCookies ? 'text-success' : 'text-error'" x-text="p.hasCookies ? p.cookieCount + '개' : '없음'"></span>
        </div>
      </div>
    </template>
  </div>

  <!-- Activity Feed -->
  <div class="bg-dark-card border border-dark-border rounded-lg overflow-hidden">
    <div class="px-4 py-3 border-b border-dark-border flex items-center gap-2">
      <span class="live-dot"></span>
      <h3 class="text-sm font-semibold text-white">실시간 활동</h3>
    </div>
    <div class="max-h-[300px] overflow-y-auto p-3 space-y-1.5 font-mono text-[11px]">
      <template x-for="(a, idx) in activities" :key="idx">
        <div class="flex items-center gap-2 py-1 px-2 rounded hover:bg-dark-hover transition-colors">
          <span class="text-kaia-muted/60 w-[70px] flex-shrink-0" x-text="a.ts"></span>
          <span class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                :class="{
                  'bg-info': a.type === 'scraping_started',
                  'bg-success': a.type === 'scraping_completed' || a.type === 'dm_sent',
                  'bg-accent': a.type === 'auto_assign',
                  'bg-warning': a.type === 'cookie_warning',
                  'bg-error': a.type === 'cookie_expired' || a.type === 'dm_failed',
                }"></span>
          <span :class="{
                  'text-info': a.type === 'scraping_started',
                  'text-success': a.type === 'scraping_completed' || a.type === 'dm_sent',
                  'text-accent': a.type === 'auto_assign',
                  'text-warning': a.type === 'cookie_warning',
                  'text-error': a.type === 'cookie_expired' || a.type === 'dm_failed',
                  'text-kaia-text': !['scraping_started','scraping_completed','auto_assign','cookie_warning','cookie_expired','dm_sent','dm_failed'].includes(a.type)
                }" x-text="a.message"></span>
        </div>
      </template>
      <div x-show="activities.length === 0" class="text-center text-kaia-muted py-8">활동이 없습니다. 스크래핑이나 캠페인을 시작하세요.</div>
    </div>
  </div>
</div>
