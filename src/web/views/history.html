<!-- History Page — Scraping + DM Tabs -->
<div x-data="{ activeTab: 'scraping' }">
  <!-- Tab Switcher -->
  <div class="flex items-center gap-4 mb-6">
    <h2 class="text-2xl font-heading font-bold text-white">작업 이력</h2>
    <div class="flex gap-1 bg-dark-card border border-dark-border rounded-lg p-0.5">
      <button @click="activeTab = 'scraping'"
              :class="activeTab === 'scraping' ? 'bg-accent text-black' : 'text-kaia-text hover:text-white'"
              class="px-3 py-1 text-xs font-semibold rounded-md transition-colors">스크래핑</button>
      <button @click="activeTab = 'dm'"
              :class="activeTab === 'dm' ? 'bg-accent text-black' : 'text-kaia-text hover:text-white'"
              class="px-3 py-1 text-xs font-semibold rounded-md transition-colors">DM 발송</button>
    </div>
  </div>

  <!-- ════════ Scraping Tab ════════ -->
  <div x-show="activeTab === 'scraping'" x-data="historyPage()" x-init="load(); $nextTick(() => initSSE())" @destroy="destroySSE()">
    <!-- Header Stats -->
    <div class="flex items-center justify-end mb-4">
      <div class="flex items-center gap-4 text-[12px]">
        <span class="text-kaia-muted">전체: <span class="font-mono text-white font-semibold" x-text="total"></span></span>
        <span class="text-success">완료: <span class="font-mono" x-text="stats.completed"></span></span>
        <span class="text-info">진행: <span class="font-mono" x-text="stats.running"></span></span>
        <span class="text-error">실패: <span class="font-mono" x-text="stats.failed"></span></span>
        <span class="text-kaia-muted">총 수집: <span class="font-mono text-accent" x-text="formatNumber(stats.totalResults)"></span></span>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="bg-dark-card border border-dark-border rounded-lg mb-4">
      <div class="px-4 py-2.5 flex flex-wrap items-center gap-2">
        <span class="text-[10px] text-kaia-muted font-medium uppercase tracking-wider">필터</span>
        <select x-model="filterPlatform" @change="offset=0; load()" class="text-xs rounded-lg border px-2 py-1">
          <option value="">플랫폼: 전체</option>
          <option value="instagram">Instagram</option>
          <option value="twitter">Twitter</option>
          <option value="tiktok">TikTok</option>
          <option value="youtube">YouTube</option>
        </select>
        <select x-model="filterStatus" @change="offset=0; load()" class="text-xs rounded-lg border px-2 py-1">
          <option value="">상태: 전체</option>
          <option value="completed">완료</option>
          <option value="running">진행중</option>
          <option value="failed">실패</option>
          <option value="pending">대기</option>
        </select>
        <select x-model="filterType" @change="offset=0; load()" class="text-xs rounded-lg border px-2 py-1">
          <option value="">유형: 전체</option>
          <option value="hashtag">해시태그</option>
          <option value="profile">프로필</option>
        </select>
        <input type="text" x-model="filterSearch" @input.debounce.400ms="offset=0; load()" placeholder="검색어 필터..."
               class="rounded-lg border px-3 py-1 text-xs w-40">
        <div class="flex-1"></div>
        <button x-show="hasFilters()" @click="resetFilters()" class="text-[10px] text-error hover:text-error/80 px-1">초기화</button>
        <button @click="bulkDelete()" x-show="selectedJobs.length > 0" class="text-[10px] text-error hover:text-error/80 px-2 py-1 border border-error/30 rounded-lg">
          선택 삭제 (<span x-text="selectedJobs.length"></span>)
        </button>
      </div>
    </div>

    <!-- Job List -->
    <div class="bg-dark-card border border-dark-border rounded-lg overflow-hidden">
      <div x-show="loading" class="text-center py-12 text-kaia-muted">로딩 중...</div>
      <div x-show="!loading && filteredJobs.length === 0" class="text-center py-12 text-kaia-muted">
        <p x-show="hasFilters()">필터 조건에 맞는 이력이 없습니다.</p>
        <p x-show="!hasFilters()">아직 스크래핑 이력이 없습니다.</p>
      </div>

      <!-- Column Headers -->
      <div x-show="!loading && filteredJobs.length > 0"
           class="grid grid-cols-[28px_28px_56px_56px_1fr_72px_72px_88px_120px] gap-0 items-center border-b border-dark-border px-2"
           style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#919DB5;">
        <div class="py-2.5"></div>
        <div class="py-2.5 text-center">
          <input type="checkbox" @change="toggleSelectAll($event)" class="rounded border-dark-border w-3 h-3">
        </div>
        <div class="py-2.5 px-1">플랫폼</div>
        <div class="py-2.5 px-1">유형</div>
        <div class="py-2.5 px-2">검색어</div>
        <div class="py-2.5 text-center">상태</div>
        <div class="py-2.5 px-1 text-right">결과</div>
        <div class="py-2.5 px-1">날짜</div>
        <div class="py-2.5 px-1 text-center">작업</div>
      </div>

      <!-- Job Rows -->
      <template x-for="job in filteredJobs" :key="job.id">
        <div>
          <div @click="job._expanded = !job._expanded"
               class="grid grid-cols-[28px_28px_56px_56px_1fr_72px_72px_88px_120px] gap-0 items-center px-2 border-b border-[#2E2E2E]/30 cursor-pointer hover:bg-[#222730] transition-colors"
               style="font-size:13px;">
            <div class="py-2 text-center">
              <svg :class="job._expanded ? 'rotate-90' : ''" class="w-3 h-3 text-[#919DB5] transition-transform inline-block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </div>
            <div class="py-2 text-center" @click.stop>
              <input type="checkbox" :checked="selectedJobs.includes(job.id)" @change="toggleSelect(job.id)" class="rounded border-dark-border w-3 h-3">
            </div>
            <div class="py-2 px-1">
              <span class="badge text-[10px]" :class="'badge-' + (job.platform === 'instagram' ? 'ig' : job.platform === 'twitter' ? 'tw' : job.platform === 'tiktok' ? 'tt' : 'yt')" x-text="job.platform.slice(0,2).toUpperCase()"></span>
            </div>
            <div class="py-2 px-1">
              <span class="text-[11px] px-1.5 py-0.5 rounded" :class="job.type === 'hashtag' ? 'bg-accent/10 text-accent' : 'bg-info/10 text-info'" x-text="job.type === 'hashtag' ? '#' : '@'"></span>
            </div>
            <div class="py-2 px-2 truncate"><span class="text-white font-medium" x-text="job.query"></span></div>
            <div class="py-2 text-center">
              <span class="inline-flex items-center gap-1">
                <span class="w-1.5 h-1.5 rounded-full" :class="{ 'bg-warning': job.status === 'pending', 'bg-info animate-pulse': job.status === 'running', 'bg-success': job.status === 'completed' && job.resultCount > 0, 'bg-error': job.status === 'failed' }"></span>
                <span class="text-[11px]" :class="{ 'text-success': job.status === 'completed', 'text-error': job.status === 'failed', 'text-info': job.status === 'running', 'text-warning': job.status === 'pending' }" x-text="job.status === 'completed' ? '완료' : job.status === 'failed' ? '실패' : job.status === 'running' ? '진행중' : '대기'"></span>
              </span>
            </div>
            <div class="py-2 px-1 text-right">
              <span class="font-mono text-[12px] text-accent" x-text="job.profilesSaved > 0 ? formatNumber(job.profilesSaved) : formatNumber(job.resultCount)"></span>
              <span x-show="job.profilesFiltered > 0" class="text-[9px] text-kaia-muted" x-text="'(-' + job.profilesFiltered + ')'"></span>
            </div>
            <div class="py-2 px-1 text-[11px] text-[#919DB5]" x-text="formatDateShort(job.createdAt)"></div>
            <div class="py-2 px-1 flex items-center justify-center gap-1" @click.stop>
              <button @click="rerun(job)" class="badge bg-dark-hover text-kaia-text text-[10px] cursor-pointer hover:text-white">재실행</button>
              <button @click="remove(job.id)" class="badge badge-error text-[10px] cursor-pointer hover:opacity-80">삭제</button>
            </div>
          </div>
          <div x-show="job._expanded" x-transition class="bg-[#0F1015] border-b border-[#2E2E2E]/40 px-5 py-4 text-[12px] text-kaia-text">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div class="space-y-1">
                <div class="text-[10px] text-kaia-muted uppercase font-semibold">수집</div>
                <div><span class="text-kaia-muted">포스트:</span> <span class="font-mono text-white" x-text="formatNumber(job.resultCount)"></span></div>
                <div><span class="text-kaia-muted">유효 프로필:</span> <span class="font-mono text-accent" x-text="job.profilesSaved || 0"></span></div>
              </div>
              <div class="space-y-1">
                <div class="text-[10px] text-kaia-muted uppercase font-semibold">필터링</div>
                <div><span class="text-kaia-muted">팔로워 미달:</span> <span class="font-mono text-warning" x-text="job.profilesFiltered || 0"></span></div>
                <div><span class="text-kaia-muted">중복 스킵:</span> <span class="font-mono" x-text="job.profilesSkipped || 0"></span></div>
                <div><span class="text-kaia-muted">enrichment 실패:</span> <span class="font-mono text-error" x-text="job.profilesFailed || 0"></span></div>
              </div>
              <div class="space-y-1">
                <div class="text-[10px] text-kaia-muted uppercase font-semibold">시간</div>
                <div><span class="text-kaia-muted">소요:</span> <span class="font-mono text-accent" x-text="job.completedAt ? calcDuration(job.createdAt, job.completedAt) : '-'"></span></div>
                <div><span class="text-kaia-muted">ID:</span> <span class="font-mono text-[10px]" x-text="job.id.substring(0,12)+'...'"></span></div>
              </div>
              <div class="space-y-1">
                <div class="text-[10px] text-kaia-muted uppercase font-semibold">비고</div>
                <div x-show="job.error"><span class="text-warning text-[11px]" x-text="job.error"></span></div>
                <div x-show="!job.error"><span class="text-kaia-muted">-</span></div>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- Pagination -->
      <div x-show="total > limit" class="px-5 py-3 border-t border-dark-border flex items-center justify-between">
        <div class="text-sm text-kaia-muted"><span x-text="offset + 1"></span>-<span x-text="Math.min(offset + limit, total)"></span> of <span class="font-mono" x-text="total"></span></div>
        <div class="flex gap-2">
          <button @click="offset = Math.max(0, offset - limit); load()" :disabled="offset === 0" class="px-3 py-1 text-sm border border-dark-border rounded-lg text-kaia-text hover:text-white disabled:opacity-30">이전</button>
          <button @click="offset = offset + limit; load()" :disabled="offset + limit >= total" class="px-3 py-1 text-sm border border-dark-border rounded-lg text-kaia-text hover:text-white disabled:opacity-30">다음</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════ DM Tab ════════ -->
  <div x-show="activeTab === 'dm'" x-data="dmHistoryPage()" x-init="load()">
    <!-- Header Stats -->
    <div class="flex items-center justify-end mb-4">
      <div class="flex items-center gap-4 text-[12px]">
        <span class="text-kaia-muted">전체: <span class="font-mono text-white font-semibold" x-text="total"></span></span>
        <span class="text-success">성공: <span class="font-mono" x-text="stats.success || 0"></span></span>
        <span class="text-info">처리중: <span class="font-mono" x-text="stats.processing || 0"></span></span>
        <span class="text-warning">대기: <span class="font-mono" x-text="stats.pending || 0"></span></span>
        <span class="text-error">실패: <span class="font-mono" x-text="stats.failed || 0"></span></span>
        <span class="text-kaia-muted">스킵: <span class="font-mono" x-text="stats.skipped || 0"></span></span>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="bg-dark-card border border-dark-border rounded-lg mb-4">
      <div class="px-4 py-2.5 flex flex-wrap items-center gap-2">
        <span class="text-[10px] text-kaia-muted font-medium uppercase tracking-wider">필터</span>
        <select x-model="filterPlatform" @change="offset=0; load()" class="text-xs rounded-lg border px-2 py-1">
          <option value="">플랫폼: 전체</option>
          <option value="instagram">Instagram</option>
          <option value="twitter">Twitter</option>
          <option value="tiktok">TikTok</option>
        </select>
        <select x-model="filterStatus" @change="offset=0; load()" class="text-xs rounded-lg border px-2 py-1">
          <option value="">상태: 전체</option>
          <option value="success">성공</option>
          <option value="failed">실패</option>
          <option value="pending">대기</option>
          <option value="processing">처리중</option>
          <option value="skipped">스킵</option>
        </select>
        <select x-model="filterCampaign" @change="offset=0; load()" class="text-xs rounded-lg border px-2 py-1">
          <option value="">캠페인: 전체</option>
          <template x-for="c in campaigns" :key="c.id">
            <option :value="c.id" x-text="c.name"></option>
          </template>
        </select>
        <input type="text" x-model="filterSearch" @input.debounce.400ms="offset=0; load()" placeholder="수신자 검색..."
               class="rounded-lg border px-3 py-1 text-xs w-40">
        <div class="flex-1"></div>
        <button x-show="filterPlatform || filterStatus || filterCampaign || filterSearch"
                @click="filterPlatform=''; filterStatus=''; filterCampaign=''; filterSearch=''; offset=0; load()"
                class="text-[10px] text-error hover:text-error/80 px-1">초기화</button>
      </div>
    </div>

    <!-- DM List -->
    <div class="bg-dark-card border border-dark-border rounded-lg overflow-hidden">
      <div x-show="loading" class="text-center py-12 text-kaia-muted">로딩 중...</div>
      <div x-show="!loading && items.length === 0" class="text-center py-12 text-kaia-muted">DM 발송 이력이 없습니다.</div>

      <!-- Column Headers -->
      <div x-show="!loading && items.length > 0"
           class="grid grid-cols-[28px_48px_minmax(100px,1fr)_minmax(100px,1fr)_60px_90px_120px] gap-1 items-center border-b border-dark-border px-2"
           style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#919DB5;">
        <div class="py-2.5"></div>
        <div class="py-2.5">플랫폼</div>
        <div class="py-2.5 px-1">수신자</div>
        <div class="py-2.5 px-1">캠페인</div>
        <div class="py-2.5 text-center">상태</div>
        <div class="py-2.5">발송계정</div>
        <div class="py-2.5 cursor-pointer select-none" @click="toggleSort()">
          발송일시
          <span x-show="sortOrder === 'desc'" class="text-accent">▼</span>
          <span x-show="sortOrder === 'asc'" class="text-accent">▲</span>
        </div>
      </div>

      <!-- DM Rows -->
      <template x-for="item in items" :key="item.id">
        <div>
          <div @click="item._expanded = !item._expanded"
               class="grid grid-cols-[28px_48px_minmax(100px,1fr)_minmax(100px,1fr)_60px_90px_120px] gap-1 items-center px-2 border-b border-[#2E2E2E]/30 cursor-pointer hover:bg-[#222730] transition-colors"
               style="font-size:13px;">
            <div class="py-2 text-center">
              <svg :class="item._expanded ? 'rotate-90' : ''" class="w-3 h-3 text-[#919DB5] transition-transform inline-block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </div>
            <div class="py-2">
              <span class="badge text-[10px]" :class="'badge-' + (item.platform === 'instagram' ? 'ig' : item.platform === 'twitter' ? 'tw' : 'tt')" x-text="item.platform.slice(0,2).toUpperCase()"></span>
            </div>
            <div class="py-2 px-1 truncate">
              <span class="text-white font-medium text-[12px]" x-text="'@' + (item.recipient || '?')"></span>
            </div>
            <div class="py-2 px-1 truncate text-kaia-text text-[11px]" x-text="item.campaign_name || '-'"></div>
            <div class="py-2 text-center">
              <span class="inline-flex items-center gap-1">
                <span class="w-1.5 h-1.5 rounded-full" :class="{
                  'bg-success': item.execute_status === 'success',
                  'bg-error': item.execute_status === 'failed',
                  'bg-warning': item.execute_status === 'pending',
                  'bg-info animate-pulse': item.execute_status === 'processing',
                  'bg-kaia-muted': item.execute_status === 'skipped'
                }"></span>
                <span class="text-[10px]" :class="{
                  'text-success': item.execute_status === 'success',
                  'text-error': item.execute_status === 'failed',
                  'text-warning': item.execute_status === 'pending',
                  'text-info': item.execute_status === 'processing',
                  'text-kaia-muted': item.execute_status === 'skipped'
                }" x-text="item.execute_status === 'success' ? '성공' : item.execute_status === 'failed' ? '실패' : item.execute_status === 'pending' ? '대기' : item.execute_status === 'processing' ? '처리중' : '스킵'"></span>
              </span>
            </div>
            <div class="py-2 text-[10px] text-kaia-text truncate" x-text="item.account_username ? '@' + item.account_username.slice(-6) : '-'"></div>
            <div class="py-2 text-[11px] text-[#919DB5] whitespace-nowrap" x-text="item.executed_at ? formatDateShort(item.executed_at) : formatDateShort(item.created_at)"></div>
          </div>

          <!-- Expanded Detail -->
          <div x-show="item._expanded" x-transition class="bg-[#0F1015] border-b border-[#2E2E2E]/40 px-5 py-4">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-x-8 gap-y-3 text-[12px]">
              <div class="space-y-1.5">
                <div class="text-[10px] text-kaia-muted uppercase tracking-wider font-semibold">수신자 정보</div>
                <div><span class="text-kaia-muted">계정:</span> <span class="text-accent" x-text="'@' + (item.recipient || '?')"></span></div>
                <div><span class="text-kaia-muted">이름:</span> <span class="text-white" x-text="item.recipient_name || '-'"></span></div>
                <div><span class="text-kaia-muted">팔로워:</span> <span class="font-mono text-white" x-text="item.followers_count ? formatNumber(item.followers_count) : '-'"></span></div>
                <div><span class="text-kaia-muted">국가:</span> <span class="text-white" x-text="(item.ai_country || item.detected_country || '-').toUpperCase()"></span></div>
              </div>
              <div class="space-y-1.5">
                <div class="text-[10px] text-kaia-muted uppercase tracking-wider font-semibold">발송 정보</div>
                <div><span class="text-kaia-muted">캠페인:</span> <span class="text-white" x-text="item.campaign_name || '-'"></span></div>
                <div><span class="text-kaia-muted">브랜드:</span> <span class="text-white" x-text="item.campaign_brand || '-'"></span></div>
                <div><span class="text-kaia-muted">발송계정:</span> <span class="text-white" x-text="item.account_username || '-'"></span></div>
                <div><span class="text-kaia-muted">재시도:</span> <span class="font-mono" x-text="item.retry_count || 0"></span></div>
              </div>
              <div class="space-y-1.5">
                <div class="text-[10px] text-kaia-muted uppercase tracking-wider font-semibold">프록시 & 인게이지먼트</div>
                <div><span class="text-kaia-muted">Proxy IP:</span> <span class="font-mono" :class="item.proxy_ip === 'direct' ? 'text-error' : 'text-success'" x-text="item.proxy_ip || '-'"></span></div>
                <div><span class="text-kaia-muted">인게이지먼트:</span> <span class="text-white" x-text="item.engagement_status || 'none'"></span></div>
                <div x-show="item.liked_post_url"><span class="text-kaia-muted">좋아요:</span> <span class="text-info text-[11px]" x-text="item.liked_post_url"></span></div>
                <div x-show="item.comment_text"><span class="text-kaia-muted">댓글:</span> <span class="text-info text-[11px]" x-text="item.comment_text"></span></div>
              </div>
              <div class="space-y-1.5">
                <div class="text-[10px] text-kaia-muted uppercase tracking-wider font-semibold">시간 & 오류</div>
                <div><span class="text-kaia-muted">생성:</span> <span class="text-kaia-text" x-text="formatDate(item.created_at)"></span></div>
                <div><span class="text-kaia-muted">발송:</span> <span class="text-kaia-text" x-text="item.executed_at ? formatDate(item.executed_at) : '-'"></span></div>
                <div x-show="item.error_message"><span class="text-kaia-muted">오류:</span> <span class="text-error text-[11px]" x-text="item.error_message"></span></div>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- Pagination -->
      <div x-show="total > limit" class="px-5 py-3 border-t border-dark-border flex items-center justify-between">
        <div class="text-sm text-kaia-muted"><span x-text="offset + 1"></span>-<span x-text="Math.min(offset + limit, total)"></span> of <span class="font-mono" x-text="total"></span></div>
        <div class="flex gap-2">
          <button @click="offset = Math.max(0, offset - limit); load()" :disabled="offset === 0" class="px-3 py-1 text-sm border border-dark-border rounded-lg text-kaia-text hover:text-white disabled:opacity-30">이전</button>
          <button @click="offset = offset + limit; load()" :disabled="offset + limit >= total" class="px-3 py-1 text-sm border border-dark-border rounded-lg text-kaia-text hover:text-white disabled:opacity-30">다음</button>
        </div>
      </div>
