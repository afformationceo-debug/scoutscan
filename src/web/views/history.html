<!-- History Page -->
<div x-data="historyPage()" x-init="load()">
  <h2 class="text-2xl font-heading font-bold text-white mb-6">스크래핑 이력</h2>

  <div class="guide-box mb-6">
    <p><strong>작업 이력</strong>에서 모든 스크래핑 작업의 기록을 확인할 수 있습니다. 각 작업의 <strong>보기</strong>를 클릭하면 수집된 포스트와 프로필 상세 정보를 볼 수 있으며, <strong>CSV/XLSX</strong>로 내보내기가 가능합니다.</p>
  </div>

  <div class="bg-dark-card border border-dark-border rounded-lg overflow-hidden">
    <table class="min-w-full data-table" x-show="jobs.length > 0">
      <thead>
        <tr class="border-b border-dark-border">
          <th class="px-4 py-3 text-left">ID</th>
          <th class="px-4 py-3 text-left">유형</th>
          <th class="px-4 py-3 text-left">플랫폼</th>
          <th class="px-4 py-3 text-left">검색어</th>
          <th class="px-4 py-3 text-left">상태</th>
          <th class="px-4 py-3 text-right">결과</th>
          <th class="px-4 py-3 text-left">생성일</th>
          <th class="px-4 py-3 text-left">작업</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="job in jobs" :key="job.id">
          <tr class="border-b border-dark-border/30">
            <td class="px-4 py-3 font-mono text-kaia-muted text-xs" x-text="job.id.substring(0, 8)"></td>
            <td class="px-4 py-3 capitalize text-white" x-text="job.type"></td>
            <td class="px-4 py-3">
              <span class="badge" :class="'badge-' + (job.platform === 'instagram' ? 'ig' : job.platform === 'twitter' ? 'tw' : job.platform === 'tiktok' ? 'tt' : job.platform === 'youtube' ? 'yt' : 'xhs')" x-text="job.platform"></span>
            </td>
            <td class="px-4 py-3 text-white font-medium">
              <span x-text="job.type === 'hashtag' ? '#' : '@'"></span><span x-text="job.query"></span>
            </td>
            <td class="px-4 py-3">
              <span class="badge"
                    :class="{ 'badge-warning': job.status === 'pending', 'badge-info': job.status === 'running', 'badge-success': job.status === 'completed', 'badge-error': job.status === 'failed' }"
                    x-text="job.status"></span>
            </td>
            <td class="px-4 py-3 text-right num text-white" x-text="job.resultCount"></td>
            <td class="px-4 py-3 text-kaia-muted text-xs" x-text="new Date(job.createdAt).toLocaleString()"></td>
            <td class="px-4 py-3 space-x-2">
              <a :href="job.type === 'hashtag' ? '/search?jobId=' + job.id : '/profiles?jobId=' + job.id"
                 class="text-accent text-xs hover:text-accent-hover">보기</a>
              <button @click="rerun(job)" class="text-kaia-text text-xs hover:text-white">재실행</button>
              <button @click="exportJob(job.id, 'csv')" class="text-kaia-text text-xs hover:text-white">CSV</button>
              <button @click="exportJob(job.id, 'xlsx')" class="text-kaia-text text-xs hover:text-white">XLSX</button>
              <button @click="remove(job.id)" class="text-error text-xs hover:opacity-80">삭제</button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>

    <p x-show="jobs.length === 0" class="text-kaia-muted text-center py-12">아직 스크래핑 이력이 없습니다.</p>

    <!-- Pagination -->
    <div x-show="total > limit" class="px-4 py-3 border-t border-dark-border flex items-center justify-between">
      <span class="text-sm text-kaia-muted" x-text="'전체 ' + total + '건 중 ' + (offset+1) + '-' + Math.min(offset+limit, total) + '건'"></span>
      <div class="flex gap-2">
        <button @click="offset = Math.max(0, offset - limit); load()" :disabled="offset === 0"
                class="px-3 py-1 border border-dark-border rounded-lg text-sm text-kaia-text hover:text-white disabled:opacity-30">이전</button>
        <button @click="offset += limit; load()" :disabled="offset + limit >= total"
                class="px-3 py-1 border border-dark-border rounded-lg text-sm text-kaia-text hover:text-white disabled:opacity-30">다음</button>
      </div>
    </div>
  </div>
</div>
