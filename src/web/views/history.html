<!-- History Page -->
<div x-data="historyPage()" x-init="load(); $nextTick(() => initSSE())" @destroy="destroySSE()">
  <!-- Header + Quick Stats -->
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-heading font-bold text-white">스크래핑 이력</h2>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-4 text-[12px]">
        <span class="text-kaia-muted">전체: <span class="font-mono text-white font-semibold" x-text="total"></span></span>
        <span class="text-success">완료: <span class="font-mono" x-text="stats.completed"></span></span>
        <span class="text-info">진행: <span class="font-mono" x-text="stats.running"></span></span>
        <span class="text-error">실패: <span class="font-mono" x-text="stats.failed"></span></span>
        <span class="text-kaia-muted">총 수집: <span class="font-mono text-accent" x-text="formatNumber(stats.totalResults)"></span></span>
      </div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="bg-dark-card border border-dark-border rounded-lg mb-4">
    <div class="px-4 py-2.5 flex flex-wrap items-center gap-2">
      <span class="text-[10px] text-kaia-muted font-medium uppercase tracking-wider">필터</span>
      <select x-model="filterPlatform" @change="offset=0; load()" class="text-xs rounded-lg border px-2 py-1">
        <option value="">플랫폼: 전체</option>
        <option value="instagram">Instagram</option>
        <option value="twitter">Twitter</option>
        <option value="tiktok">TikTok</option>
        <option value="youtube">YouTube</option>
      </select>
      <select x-model="filterStatus" @change="offset=0; load()" class="text-xs rounded-lg border px-2 py-1">
        <option value="">상태: 전체</option>
        <option value="completed">완료</option>
        <option value="running">진행중</option>
        <option value="failed">실패</option>
        <option value="pending">대기</option>
      </select>
      <select x-model="filterType" @change="offset=0; load()" class="text-xs rounded-lg border px-2 py-1">
        <option value="">유형: 전체</option>
        <option value="hashtag">해시태그</option>
        <option value="profile">프로필</option>
      </select>
      <input type="text" x-model="filterSearch" @input.debounce.400ms="offset=0; load()" placeholder="검색어 필터..."
             class="rounded-lg border px-3 py-1 text-xs w-40">
      <div class="flex-1"></div>
      <button x-show="hasFilters()" @click="resetFilters()" class="text-[10px] text-error hover:text-error/80 px-1">초기화</button>
      <button @click="bulkDelete()" x-show="selectedJobs.length > 0" class="text-[10px] text-error hover:text-error/80 px-2 py-1 border border-error/30 rounded-lg">
        선택 삭제 (<span x-text="selectedJobs.length"></span>)
      </button>
    </div>
  </div>

  <!-- Job List -->
  <div class="bg-dark-card border border-dark-border rounded-lg overflow-hidden">
    <div x-show="loading" class="text-center py-12 text-kaia-muted">로딩 중...</div>
    <div x-show="!loading && filteredJobs.length === 0" class="text-center py-12 text-kaia-muted">
      <p x-show="hasFilters()">필터 조건에 맞는 이력이 없습니다.</p>
      <p x-show="!hasFilters()">아직 스크래핑 이력이 없습니다.</p>
    </div>

    <!-- Column Headers -->
    <div x-show="!loading && filteredJobs.length > 0"
         class="grid grid-cols-[28px_28px_56px_56px_1fr_72px_72px_88px_120px] gap-0 items-center border-b border-dark-border px-2"
         style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#919DB5;">
      <div class="py-2.5"></div>
      <div class="py-2.5 text-center">
        <input type="checkbox" @change="toggleSelectAll($event)" class="rounded border-dark-border w-3 h-3">
      </div>
      <div class="py-2.5 px-1">플랫폼</div>
      <div class="py-2.5 px-1">유형</div>
      <div class="py-2.5 px-2">검색어</div>
      <div class="py-2.5 text-center">상태</div>
      <div class="py-2.5 px-1 text-right">결과</div>
      <div class="py-2.5 px-1">날짜</div>
      <div class="py-2.5 px-1 text-center">작업</div>
    </div>

    <!-- Job Rows -->
    <template x-for="job in filteredJobs" :key="job.id">
      <div>
        <!-- Main Row -->
        <div @click="job._expanded = !job._expanded"
             class="grid grid-cols-[28px_28px_56px_56px_1fr_72px_72px_88px_120px] gap-0 items-center px-2 border-b border-[#2E2E2E]/30 cursor-pointer hover:bg-[#222730] transition-colors"
             style="font-size:13px;">
          <div class="py-2 text-center">
            <svg :class="job._expanded ? 'rotate-90' : ''" class="w-3 h-3 text-[#919DB5] transition-transform inline-block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </div>
          <div class="py-2 text-center" @click.stop>
            <input type="checkbox" :checked="selectedJobs.includes(job.id)" @change="toggleSelect(job.id)" class="rounded border-dark-border w-3 h-3">
          </div>
          <div class="py-2 px-1">
            <span class="badge text-[10px]" :class="'badge-' + (job.platform === 'instagram' ? 'ig' : job.platform === 'twitter' ? 'tw' : job.platform === 'tiktok' ? 'tt' : job.platform === 'youtube' ? 'yt' : 'xhs')" x-text="job.platform.slice(0,2).toUpperCase()"></span>
          </div>
          <div class="py-2 px-1">
            <span class="text-[11px] px-1.5 py-0.5 rounded" :class="job.type === 'hashtag' ? 'bg-accent/10 text-accent' : 'bg-info/10 text-info'" x-text="job.type === 'hashtag' ? '#' : '@'"></span>
          </div>
          <div class="py-2 px-2 truncate">
            <span class="text-white font-medium" x-text="job.query"></span>
          </div>
          <div class="py-2 text-center">
            <span class="inline-flex items-center gap-1">
              <span class="w-1.5 h-1.5 rounded-full" :class="{
                'bg-warning': job.status === 'pending' || (job.status === 'completed' && job.resultCount === 0),
                'bg-info animate-pulse': job.status === 'running',
                'bg-success': job.status === 'completed' && job.resultCount > 0,
                'bg-error': job.status === 'failed'
              }"></span>
              <span x-show="job.status !== 'running'" class="text-[11px]" :class="{
                'text-warning': job.status === 'pending' || (job.status === 'completed' && job.resultCount === 0),
                'text-success': job.status === 'completed' && job.resultCount > 0,
                'text-error': job.status === 'failed'
              }" x-text="job.status === 'completed' ? (job.resultCount === 0 ? '⚠ 결과없음' : '완료') : job.status === 'failed' ? '실패' : '대기'"></span>
              <span x-show="job.status === 'running'" class="text-[11px] text-info" x-text="(job.resultCount || 0) + '/' + (job.maxResults || '?') + ' 수집중...'"></span>
            </span>
          </div>
          <div class="py-2 px-1 text-right">
            <span class="font-mono text-[12px]" :class="job.status === 'completed' && job.resultCount === 0 ? 'text-warning' : 'text-white'" x-text="formatNumber(job.resultCount)"></span>
          </div>
          <div class="py-2 px-1 text-[11px] text-[#919DB5] whitespace-nowrap" x-text="formatDateShort(job.createdAt)"></div>
          <div class="py-2 px-1 flex items-center justify-center gap-1" @click.stop>
            <a :href="job.type === 'hashtag' ? '/search?jobId=' + job.id : '/profiles?jobId=' + job.id"
               class="badge badge-accent text-[10px] cursor-pointer hover:opacity-80">보기</a>
            <button @click="rerun(job)" class="badge bg-dark-hover text-kaia-text text-[10px] cursor-pointer hover:text-white">재실행</button>
            <button @click="remove(job.id)" class="badge badge-error text-[10px] cursor-pointer hover:opacity-80">삭제</button>
          </div>
        </div>

        <!-- Expanded Detail -->
        <div x-show="job._expanded"
             x-transition:enter="transition ease-out duration-150"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-100"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="bg-[#0F1015] border-b border-[#2E2E2E]/40 px-5 py-4">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-x-8 gap-y-3 text-[12px]">
            <!-- Col 1: Job Info -->
            <div class="space-y-2">
              <div class="text-[10px] text-kaia-muted uppercase tracking-wider font-semibold mb-1">작업 정보</div>
              <div>
                <span class="text-kaia-muted">ID: </span>
                <span class="text-kaia-text font-mono text-[11px]" x-text="job.id.substring(0, 12) + '...'"></span>
              </div>
              <div>
                <span class="text-kaia-muted">유형: </span>
                <span class="text-white capitalize" x-text="job.type"></span>
              </div>
              <div>
                <span class="text-kaia-muted">플랫폼: </span>
                <span class="text-white capitalize" x-text="job.platform"></span>
              </div>
              <div>
                <span class="text-kaia-muted">검색어: </span>
                <span class="text-accent font-medium" x-text="(job.type === 'hashtag' ? '#' : '@') + job.query"></span>
              </div>
            </div>
            <!-- Col 2: Results -->
            <div class="space-y-2">
              <div class="text-[10px] text-kaia-muted uppercase tracking-wider font-semibold mb-1">결과</div>
              <div>
                <span class="text-kaia-muted">수집 건수: </span>
                <span class="text-white font-mono" x-text="(job.resultCount || 0).toLocaleString()"></span>
              </div>
              <div>
                <span class="text-kaia-muted">최대 설정: </span>
                <span class="text-kaia-text font-mono" x-text="job.maxResults || '-'"></span>
              </div>
              <div>
                <span class="text-kaia-muted">상태: </span>
                <span class="badge" :class="{ 'badge-warning': job.status === 'pending' || (job.status === 'completed' && job.resultCount === 0), 'badge-info': job.status === 'running', 'badge-success': job.status === 'completed' && job.resultCount > 0, 'badge-error': job.status === 'failed' }" x-text="job.status === 'completed' && job.resultCount === 0 ? 'warning' : job.status"></span>
              </div>
              <div x-show="job.status === 'running' && job.maxResults > 0" class="mt-1">
                <div class="flex items-center gap-2">
                  <div class="flex-1 h-1.5 bg-dark-border rounded-full overflow-hidden">
                    <div class="h-full bg-info rounded-full transition-all duration-300"
                         :style="'width:' + Math.min(100, Math.round(((job.resultCount || 0) / job.maxResults) * 100)) + '%'"></div>
                  </div>
                  <span class="text-[10px] text-info font-mono" x-text="Math.min(100, Math.round(((job.resultCount || 0) / job.maxResults) * 100)) + '%'"></span>
                </div>
              </div>
              <div x-show="job.error" class="mt-1">
                <span class="text-kaia-muted">오류/경고: </span>
                <span class="text-warning text-[11px]" x-text="job.error"></span>
              </div>
            </div>
            <!-- Col 3: Timing -->
            <div class="space-y-2">
              <div class="text-[10px] text-kaia-muted uppercase tracking-wider font-semibold mb-1">시간 정보</div>
              <div>
                <span class="text-kaia-muted">생성: </span>
                <span class="text-kaia-text" x-text="formatDate(job.createdAt)"></span>
              </div>
              <div>
                <span class="text-kaia-muted">완료: </span>
                <span class="text-kaia-text" x-text="job.completedAt ? formatDate(job.completedAt) : '-'"></span>
              </div>
              <div x-show="job.completedAt && job.createdAt">
                <span class="text-kaia-muted">소요: </span>
                <span class="text-accent font-mono" x-text="calcDuration(job.createdAt, job.completedAt)"></span>
              </div>
            </div>
            <!-- Col 4: Actions -->
            <div class="space-y-2">
              <div class="text-[10px] text-kaia-muted uppercase tracking-wider font-semibold mb-1">내보내기 & 작업</div>
              <div class="flex flex-wrap gap-2">
                <a :href="job.type === 'hashtag' ? '/search?jobId=' + job.id : '/profiles?jobId=' + job.id"
                   class="badge badge-accent cursor-pointer hover:opacity-80">상세 보기</a>
                <button @click="exportJob(job.id, 'csv')" class="badge bg-dark-hover text-kaia-text cursor-pointer hover:text-white">CSV</button>
                <button @click="exportJob(job.id, 'xlsx')" class="badge bg-dark-hover text-kaia-text cursor-pointer hover:text-white">XLSX</button>
              </div>
              <div class="flex flex-wrap gap-2 mt-2">
                <button @click="rerun(job)" class="badge bg-info/15 text-info cursor-pointer hover:opacity-80">재실행</button>
                <button @click="remove(job.id)" class="badge badge-error cursor-pointer hover:opacity-80">삭제</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- Pagination -->
    <div x-show="total > limit" class="px-5 py-3 border-t border-dark-border flex items-center justify-between">
      <div class="text-sm text-kaia-muted">
        <span x-text="offset + 1"></span>-<span x-text="Math.min(offset + limit, total)"></span> of <span class="font-mono" x-text="total"></span>
      </div>
      <div class="flex gap-2">
        <button @click="offset = Math.max(0, offset - limit); load()" :disabled="offset === 0"
                class="px-3 py-1 text-sm border border-dark-border rounded-lg text-kaia-text hover:text-white disabled:opacity-30">이전</button>
        <button @click="offset = offset + limit; load()" :disabled="offset + limit >= total"
                class="px-3 py-1 text-sm border border-dark-border rounded-lg text-kaia-text hover:text-white disabled:opacity-30">다음</button>
      </div>
    </div>
  </div>
</div>
