<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Scraper Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    [x-cloak] { display: none !important; }
    .nav-active { background-color: rgb(79 70 229); color: white; }
  </style>
</head>
<body class="h-full" x-data="app()">
  <div class="min-h-full">
    <!-- Navigation -->
    <nav class="bg-indigo-600">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between">
          <div class="flex items-center">
            <span class="text-white font-bold text-xl">Social Scraper</span>
            <div class="ml-10 flex items-baseline space-x-4">
              <a href="/" class="rounded-md px-3 py-2 text-sm font-medium text-white hover:bg-indigo-500 {{page}}"
                 :class="{'nav-active': '{{page}}' === 'dashboard'}">Dashboard</a>
              <a href="/search" class="rounded-md px-3 py-2 text-sm font-medium text-white hover:bg-indigo-500"
                 :class="{'nav-active': '{{page}}' === 'search'}">Search</a>
              <a href="/profiles" class="rounded-md px-3 py-2 text-sm font-medium text-white hover:bg-indigo-500"
                 :class="{'nav-active': '{{page}}' === 'profiles'}">Profiles</a>
              <a href="/data" class="rounded-md px-3 py-2 text-sm font-medium text-white hover:bg-indigo-500"
                 :class="{'nav-active': '{{page}}' === 'data'}">Data</a>
              <a href="/history" class="rounded-md px-3 py-2 text-sm font-medium text-white hover:bg-indigo-500"
                 :class="{'nav-active': '{{page}}' === 'history'}">History</a>
              <a href="/settings" class="rounded-md px-3 py-2 text-sm font-medium text-white hover:bg-indigo-500"
                 :class="{'nav-active': '{{page}}' === 'settings'}">Settings</a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="mx-auto max-w-7xl py-6 px-4 sm:px-6 lg:px-8">
      {{content}}
    </main>
  </div>

  <script src="/public/app.js"></script>
</body>
</html>
